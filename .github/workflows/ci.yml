name: CI

on:
  push:
    branches:
      - 'main'
  pull_request:
    types: [ opened ]


jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'
      - name: Cache Maven dependencies and build outputs
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.m2/build-cache
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml', '.mvn/extensions.xml', '.mvn/maven-build-cache-config.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Build and verify
        run: ./mvnw -B -V clean verify
